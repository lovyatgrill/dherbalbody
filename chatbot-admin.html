<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DHERBALBODY - Chatbot Admin Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: rgb(107, 112, 80);
            --primary-light: rgb(243, 246, 239);
            --border: rgb(225, 227, 225);
            --text: rgb(36, 36, 36);
            --text-light: rgb(82, 81, 81);
            --bg: rgb(255, 255, 255);
            --success: rgb(104, 102, 72);
            --error: rgb(169, 0, 0);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--primary-light);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            background: var(--bg);
            padding: 24px;
            border-radius: 12px;
            margin-bottom: 24px;
            border: 1px solid var(--border);
        }

        h1 {
            color: var(--primary);
            margin-bottom: 4px;
            font-size: 28px;
        }

        .subtitle {
            color: var(--text-light);
            font-size: 14px;
        }

        .tabs {
            display: flex;
            gap: 12px;
            border-bottom: 2px solid var(--border);
            margin-bottom: 24px;
            background: var(--bg);
            padding: 0 24px;
            border-radius: 12px 12px 0 0;
        }

        .tab-button {
            padding: 16px 20px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-light);
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
        }

        .tab-button.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .tab-content {
            display: none;
            background: var(--bg);
            padding: 24px;
            border-radius: 0 12px 12px 12px;
            border: 1px solid var(--border);
            border-top: none;
        }

        .tab-content.active {
            display: block;
        }

        .section {
            margin-bottom: 32px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--border);
        }

        .testimonial-card {
            background: var(--primary-light);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: start;
            gap: 12px;
        }

        .testimonial-content h4 {
            color: var(--primary);
            margin-bottom: 4px;
            font-size: 14px;
        }

        .testimonial-meta {
            font-size: 12px;
            color: var(--text-light);
            margin-bottom: 8px;
        }

        .testimonial-text {
            font-size: 13px;
            line-height: 1.5;
            color: var(--text);
        }

        .stars {
            color: var(--primary);
            font-size: 13px;
            margin-bottom: 4px;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge.approved {
            background-color: rgba(104, 102, 72, 0.1);
            color: var(--success);
        }

        .badge.pending {
            background-color: rgba(255, 165, 0, 0.1);
            color: #ff8c00;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background-color: rgb(85, 89, 63);
        }

        .btn-danger {
            background-color: var(--error);
            color: white;
        }

        .btn-danger:hover {
            background-color: rgb(150, 0, 0);
        }

        .btn-success {
            background-color: var(--success);
            color: white;
        }

        .btn-success:hover {
            background-color: rgb(85, 84, 60);
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: var(--text);
            font-size: 14px;
        }

        input[type="text"],
        input[type="email"],
        textarea,
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
            color: var(--text);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(107, 112, 80, 0.1);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: linear-gradient(135deg, var(--primary) 0%, rgb(85, 89, 63) 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 13px;
            opacity: 0.9;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-light);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 14px;
        }

        .alert-success {
            background-color: rgba(104, 102, 72, 0.1);
            color: var(--success);
            border: 1px solid rgba(104, 102, 72, 0.3);
        }

        .alert-error {
            background-color: rgba(169, 0, 0, 0.1);
            color: var(--error);
            border: 1px solid rgba(169, 0, 0, 0.3);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg);
            border-radius: 12px;
            padding: 24px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            margin-bottom: 20px;
        }

        .modal-header h2 {
            color: var(--primary);
            font-size: 20px;
        }

        .modal-footer {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 24px;
        }

        @media (max-width: 768px) {
            .tabs {
                overflow-x: auto;
            }

            .tab-button {
                padding: 12px 16px;
                white-space: nowrap;
            }

            .testimonial-card {
                grid-template-columns: 1fr;
            }

            .stats {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 DHERBALBODY Chatbot Admin</h1>
            <p class="subtitle">Manage testimonials and chatbot settings</p>
        </header>

        <div class="tabs">
            <button class="tab-button active" data-tab="testimonials">Testimonials</button>
            <button class="tab-button" data-tab="statistics">Statistics</button>
            <button class="tab-button" data-tab="settings">Settings</button>
        </div>

        <!-- Testimonials Tab -->
        <div class="tab-content active" id="tab-testimonials">
            <div class="section">
                <div class="section-title">📝 Customer Testimonials</div>
                <div id="testimonials-list"></div>
            </div>
        </div>

        <!-- Statistics Tab -->
        <div class="tab-content" id="tab-statistics">
            <div class="section">
                <div class="section-title">📊 Chatbot Statistics</div>
                <div class="stats" id="stats-container"></div>
            </div>

            <div class="section">
                <div class="section-title">💬 Recent Conversations</div>
                <div id="conversations-list"></div>
            </div>
        </div>

        <!-- Settings Tab -->
        <div class="tab-content" id="tab-settings">
            <div class="section">
                <div class="section-title">⚙️ Chatbot Configuration</div>
                <form id="settings-form">
                    <div class="form-group">
                        <label for="bot-name">Bot Name</label>
                        <input type="text" id="bot-name" value="DHERBALBODY Assistant" />
                    </div>

                    <div class="form-group">
                        <label for="bot-greeting">Welcome Message</label>
                        <textarea id="bot-greeting" placeholder="Enter the welcome message..." rows="3"></textarea>
                    </div>

                    <div class="form-group">
                        <label for="support-email">Support Email</label>
                        <input type="email" id="support-email" value="support@dherbalbody.com" />
                    </div>

                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="enable-testimonials" checked>
                            Enable Testimonials Collection
                        </label>
                    </div>

                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="enable-cart" checked>
                            Enable Add to Cart from Chat
                        </label>
                    </div>

                    <button type="submit" class="btn btn-primary">Save Settings</button>
                </form>
            </div>

            <div class="section">
                <div class="section-title">🗑️ Data Management</div>
                <p style="margin-bottom: 16px; color: var(--text-light);">
                    Be careful with these actions. They cannot be undone.
                </p>
                <button class="btn btn-danger" id="clear-testimonials-btn">Clear All Testimonials</button>
                <button class="btn btn-danger" id="clear-history-btn" style="margin-left: 8px;">Clear Chat History</button>
            </div>
        </div>
    </div>

    <!-- Testimonial Modal -->
    <div class="modal" id="testimonial-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>View Testimonial</h2>
            </div>
            <div id="modal-body"></div>
            <div class="modal-footer">
                <button class="btn btn-primary" id="approve-btn">Approve</button>
                <button class="btn btn-danger" id="delete-btn">Delete</button>
                <button class="btn" id="close-modal-btn" style="background-color: var(--border); color: var(--text);">Close</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { chatbotService } from './js/chatbot-service.js';
        
        // Tab switching
        document.querySelectorAll('.tab-button').forEach(button => {
            button.addEventListener('click', function() {
                const tabName = this.dataset.tab;
                
                // Remove active class from all tabs and buttons
                document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                
                // Add active class to clicked button and corresponding content
                this.classList.add('active');
                document.getElementById(`tab-${tabName}`).classList.add('active');
                
                // Load content
                if (tabName === 'testimonials') {
                    loadTestimonials();
                } else if (tabName === 'statistics') {
                    loadStatistics();
                }
            });
        });

        function loadTestimonials() {
            const testimonials = chatbotService.getTestimonials();
            const list = document.getElementById('testimonials-list');
            
            if (testimonials.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <p>No testimonials yet. Customers will see the testimonial collection prompt in the chatbot.</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = testimonials.map((t, index) => `
                <div class="testimonial-card">
                    <div class="testimonial-content">
                        <h4>${t.name} ${t.email ? `(${t.email})` : ''}</h4>
                        <div class="testimonial-meta">
                            Product: <strong>${t.productId || 'N/A'}</strong> | 
                            Date: ${t.date}
                        </div>
                        <div class="stars">${'⭐'.repeat(t.rating)}</div>
                        <p class="testimonial-text">"${t.message}"</p>
                    </div>
                    <div class="action-buttons">
                        <button class="btn btn-primary btn-sm" onclick="viewTestimonial(${index})">View</button>
                        <span class="badge ${t.approved ? 'approved' : 'pending'}">
                            ${t.approved ? '✓ Approved' : '⏳ Pending'}
                        </span>
                    </div>
                </div>
            `).join('');
        }

        function loadStatistics() {
            const testimonials = chatbotService.getTestimonials();
            const approved = testimonials.filter(t => t.approved).length;
            const pending = testimonials.filter(t => !t.approved).length;
            
            const statsHtml = `
                <div class="stat-card">
                    <div class="stat-value">${testimonials.length}</div>
                    <div class="stat-label">Total Testimonials</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${approved}</div>
                    <div class="stat-label">Approved</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${pending}</div>
                    <div class="stat-label">Pending Review</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${(testimonials.reduce((sum, t) => sum + t.rating, 0) / (testimonials.length || 1)).toFixed(1)}</div>
                    <div class="stat-label">Average Rating</div>
                </div>
            `;
            
            document.getElementById('stats-container').innerHTML = statsHtml;

            // Load recent conversations
            const history = chatbotService.conversationHistory.slice(-10);
            const conversationsHtml = history.length > 0 
                ? history.map(msg => `
                    <div style="padding: 8px; background: ${msg.type === 'user' ? 'var(--primary-light)' : 'white'}; border-radius: 4px; margin-bottom: 8px;">
                        <strong>${msg.type === 'user' ? 'Customer' : 'Bot'}:</strong> ${msg.message.substring(0, 100)}...
                        <div style="font-size: 11px; color: var(--text-light);">${msg.timestamp.toLocaleTimeString()}</div>
                    </div>
                `).join('')
                : '<div class="empty-state"><p>No conversation history yet.</p></div>';
            
            document.getElementById('conversations-list').innerHTML = conversationsHtml;
        }

        window.viewTestimonial = function(index) {
            const testimonials = chatbotService.getTestimonials();
            const t = testimonials[index];
            
            const modal = document.getElementById('testimonial-modal');
            const modalBody = document.getElementById('modal-body');
            
            modalBody.innerHTML = `
                <div>
                    <p><strong>Name:</strong> ${t.name}</p>
                    <p><strong>Email:</strong> ${t.email}</p>
                    <p><strong>Product:</strong> ${t.productId}</p>
                    <p><strong>Rating:</strong> ${'⭐'.repeat(t.rating)}</p>
                    <p><strong>Message:</strong></p>
                    <p>"${t.message}"</p>
                </div>
            `;
            
            document.getElementById('approve-btn').onclick = function() {
                t.approved = !t.approved;
                chatbotService.saveTestimonials();
                modal.classList.remove('active');
                loadTestimonials();
                alert(`Testimonial ${t.approved ? 'approved' : 'unapproved'}!`);
            };
            
            document.getElementById('delete-btn').onclick = function() {
                if (confirm('Are you sure you want to delete this testimonial?')) {
                    chatbotService.testimonials.splice(index, 1);
                    chatbotService.saveTestimonials();
                    modal.classList.remove('active');
                    loadTestimonials();
                }
            };
            
            modal.classList.add('active');
        };

        document.getElementById('close-modal-btn').addEventListener('click', function() {
            document.getElementById('testimonial-modal').classList.remove('active');
        });

        // Settings
        document.getElementById('settings-form').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Settings saved successfully!');
            // Save to localStorage
            localStorage.setItem('chatbot-settings', JSON.stringify({
                botName: document.getElementById('bot-name').value,
                botGreeting: document.getElementById('bot-greeting').value,
                supportEmail: document.getElementById('support-email').value,
                enableTestimonials: document.getElementById('enable-testimonials').checked,
                enableCart: document.getElementById('enable-cart').checked
            }));
        });

        document.getElementById('clear-testimonials-btn').addEventListener('click', function() {
            if (confirm('Clear all testimonials? This cannot be undone!')) {
                chatbotService.testimonials = [];
                chatbotService.saveTestimonials();
                loadTestimonials();
                alert('All testimonials cleared!');
            }
        });

        document.getElementById('clear-history-btn').addEventListener('click', function() {
            if (confirm('Clear conversation history? This cannot be undone!')) {
                chatbotService.conversationHistory = [];
                alert('Chat history cleared!');
            }
        });

        // Initial load
        loadTestimonials();
    </script>
</body>
</html>
